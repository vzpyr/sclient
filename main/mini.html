<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SClient</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

      :root {
        --accent: #f50;
      }

      /* ── Reset ─────────────────────────────────────────────── */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
        background: #111;
        color: #fff;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }
      *:focus {
        outline: none !important;
      }

      /* ── Blurred background ─────────────────────────────────── */
      #bg {
        position: absolute;
        top: -10%;
        left: -10%;
        width: 120%;
        height: 120%;
        background-size: cover;
        background-position: center;
        filter: blur(24px) brightness(0.33) saturate(1.5);
        z-index: 0;
        transition: background-image 0.6s ease;
      }

      /* ── Window chrome ──────────────────────────────────────── */
      .drag-region {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 40px;
        -webkit-app-region: drag;
        z-index: 10;
      }
      .window-controls {
        position: absolute;
        top: 8px;
        right: 10px;
        z-index: 20;
        -webkit-app-region: no-drag;
        display: flex;
        gap: 7px;
      }
      .window-btn {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #fff;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      .window-btn svg {
        width: 12px;
        height: 12px;
      }
      .window-btn:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      /* ── Root layout ────────────────────────────────────────── */
      .content {
        position: relative;
        z-index: 5;
        height: 100%;
        display: flex;
        flex-direction: row;
        box-sizing: border-box;
        overflow: hidden;
      }

      /* ═══════════════════════════════════════════════════════════
       MINI  (~480×180 windowed)
    ═══════════════════════════════════════════════════════════ */

      #player-section {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        justify-content: flex-start;
        gap: 14px;
        padding: 14px;
        box-sizing: border-box;
        width: 100%;
        -webkit-app-region: no-drag;
        overflow: hidden;
      }

      .artwork-container {
        flex-shrink: 0;
        display: flex;
        align-items: center;
      }
      .artwork {
        /* --mini-art-size is written by JS (window.innerHeight - 28) so both layouts always match */
        width: var(--mini-art-size, 152px);
        height: var(--mini-art-size, 152px);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05) center / cover;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
        transition: border-radius 0.3s;
      }

      .right-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 9px;
        min-width: 0;
        flex: 1;
        overflow: hidden;
      }

      .metadata {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .title {
        font-size: 14px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }
      .artist {
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.52);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
      }

      .progress-container {
        display: flex;
        align-items: center;
        gap: 7px;
        width: 100%;
        box-sizing: border-box;
      }
      .time {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
        min-width: 28px;
      }
      .time:first-child {
        text-align: left;
      }
      .time:last-child {
        text-align: right;
      }
      .progress-bar {
        flex: 1;
        height: 3px;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        position: relative;
        cursor: pointer;
        -webkit-app-region: no-drag;
        transition: height 0.15s;
      }
      .progress-bar:hover {
        height: 5px;
      }
      .progress-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        background: var(--accent);
        border-radius: 999px;
        width: 0%;
        pointer-events: none;
        transition: width 0.1s linear;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        -webkit-app-region: no-drag;
      }
      .btn {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.65);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        flex-shrink: 0;
        transition:
          color 0.15s,
          transform 0.15s;
        line-height: 0;
      }
      .btn svg {
        width: 17px;
        height: 17px;
        display: block;
      }
      .btn:hover {
        color: #fff;
        transform: scale(1.12);
      }
      .btn.active {
        color: var(--accent);
      }
      .btn.active:hover {
        color: var(--accent);
      }
      .btn-main {
        width: 40px;
        height: 40px;
        background: #fff;
        color: #111;
        border-radius: 50%;
      }
      .btn-main svg {
        width: 20px;
        height: 20px;
      }
      .btn-main:hover {
        transform: scale(1.06);
        background: #efefef;
        color: #111;
      }

      /* ── Lyrics panel ──────────────────────────────────────── */
      #lyrics-section {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
        box-sizing: border-box;
        padding: 0;
      }
      .with-lyrics #lyrics-section {
        display: flex;
      }

      #lyrics-content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        text-align: center;
        padding: 0 14px;
        box-sizing: border-box;
      }
      #lyrics-content::-webkit-scrollbar {
        width: 4px;
      }
      #lyrics-content::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
      }

      .lyric-line {
        transition: all 0.4s ease;
        font-size: 14px;
        color: #fff;
        transform-origin: center;
        transform: scale(0.95);
        cursor: pointer;
        padding: 4px 10px;
        box-sizing: border-box;
        border-radius: 6px;
      }
      .lyric-line.active {
        font-size: 16px;
        color: var(--accent);
        font-weight: bold;
        transform: scale(1.1);
        opacity: 1;
        filter: blur(0px);
      }
      .lyric-line.past {
        color: #888;
        font-weight: normal;
        transform: scale(0.95);
        opacity: 0.4;
        filter: blur(2px);
      }
      .lyric-line:hover {
        opacity: 0.9 !important;
        transform: scale(1.05) !important;
        filter: blur(0px) !important;
      }

      /* ═══════════════════════════════════════════════════════════
       WITH-LYRICS OVERRIDES  (windowed only, ≤ 899px)
    ═══════════════════════════════════════════════════════════ */
      @media (max-width: 899px), (max-height: 499px) {
        .with-lyrics #player-section {
          flex-direction: column;
          width: 255px;
          flex-shrink: 0;
          align-items: flex-start;
          justify-content: center;
          gap: 14px;
          padding: 14px;
        }
        .with-lyrics .artwork {
          width: var(--mini-art-size, 152px);
          height: var(--mini-art-size, 152px);
        }
        .with-lyrics .right-panel {
          flex: none;
          width: 100%;
        }
        .with-lyrics #lyrics-section {
          padding: 14px 14px 14px 0;
        }
      }

      /* ═══════════════════════════════════════════════════════════
       FULLSCREEN / LARGE / TV  (≥ 900 × 500)
    ═══════════════════════════════════════════════════════════ */
      @media (min-width: 900px) and (min-height: 500px) {
        .content {
          padding: 5% 8%;
          align-items: center;
          justify-content: flex-start;
        }
        .content.with-lyrics {
          align-items: stretch;
          gap: 6%;
        }

        #player-section {
          padding: 0;
          gap: 36px;
          align-items: center;
        }
        .with-lyrics #player-section {
          flex-direction: column;
          flex: none;
          width: 40%;
          max-width: 520px;
          min-width: 280px;
          align-items: flex-start;
          justify-content: center;
          gap: 36px;
          padding: 0;
        }

        .artwork {
          flex-shrink: 0;
          width: clamp(200px, 30vh, 340px);
          height: clamp(200px, 30vh, 340px);
          border-radius: 14px;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }

        /* capped at 720px so the progress bar doesn't stretch edge to edge on wide screens */
        .right-panel {
          flex: 1;
          min-width: 0;
          max-width: 720px;
          gap: 36px;
          justify-content: center;
        }
        .with-lyrics .right-panel {
          flex: none;
          width: 100%;
          max-width: 100%;
        }

        .metadata {
          gap: 10px;
        }
        .title {
          font-size: clamp(22px, 2.6vw, 36px);
          font-weight: 800;
          white-space: normal;
          line-height: 1.2;
          letter-spacing: -0.02em;
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
        }
        .artist {
          font-size: clamp(14px, 1.6vw, 20px);
          font-weight: 500;
          color: rgba(255, 255, 255, 0.6);
        }

        .progress-container {
          gap: 14px;
        }
        .time {
          font-size: 13px;
          min-width: 42px;
          color: rgba(255, 255, 255, 0.5);
        }
        .progress-bar {
          height: 5px;
          border-radius: 999px;
        }
        .progress-bar:hover {
          height: 7px;
        }

        .controls {
          justify-content: flex-start;
          gap: 32px;
        }

        .btn svg {
          width: 34px;
          height: 34px;
        }
        .btn-main {
          width: 74px;
          height: 74px;
        }
        .btn-main svg {
          width: 36px;
          height: 36px;
        }
        #icon-loop-one text {
          font-size: 16px;
        }

        /* ── Lyrics panel (right column) ── */
        /* ── Lyrics panel (right column) ── */
        #lyrics-section {
          display: flex;
          flex: 1;
          align-self: stretch;
          padding: 0;
        }
        #lyrics-content {
          padding: 0 40px;
        }
        .lyric-line {
          font-size: clamp(16px, 1.7vw, 22px);
          padding: 9px 14px;
          border-radius: 8px;
        }
        .lyric-line.active {
          font-size: clamp(20px, 2.3vw, 30px);
          transform: scale(1.08);
        }
        .lyric-line.past {
          transform: scale(0.93);
        }
      }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <div class="drag-region"></div>

    <div class="window-controls">
      <button class="window-btn" id="btn-minimize" title="Minimize">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M5 12h14" />
        </svg>
      </button>
      <button class="window-btn" id="btn-fullscreen" title="Fullscreen">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
          />
        </svg>
      </button>
      <button class="window-btn" id="btn-close" title="Back to main window">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="content">
      <div id="player-section">
        <div class="artwork-container">
          <div class="artwork" id="artwork"></div>
        </div>

        <div class="right-panel">
          <div class="metadata">
            <div class="title" id="title">Not Playing</div>
            <div class="artist" id="artist">-</div>
          </div>

          <div class="progress-container">
            <div class="time" id="time-current">0:00</div>
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time" id="time-duration">0:00</div>
          </div>

          <div class="controls">
            <button class="btn" id="btn-shuffle" title="Shuffle">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22M18 22l4-4-4-4M2 6h1.9c1.5 0 2.8.8 3.6 2l3.5 5M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-1-1.5M18 2l4 4-4 4"
                />
              </svg>
            </button>
            <button class="btn" id="btn-loop" title="Repeat">
              <svg
                id="icon-loop-all"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="display: block"
              >
                <polyline points="17 1 21 5 17 9" />
                <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                <polyline points="7 23 3 19 7 15" />
                <path d="M21 13v2a4 4 0 0 1-4 4H3" />
              </svg>
              <svg
                id="icon-loop-one"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="display: none"
              >
                <polyline points="17 1 21 5 17 9" />
                <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                <polyline points="7 23 3 19 7 15" />
                <path d="M21 13v2a4 4 0 0 1-4 4H3" />
                <text
                  x="12"
                  y="16"
                  fill="currentColor"
                  stroke="none"
                  font-size="10"
                  font-family="sans-serif"
                  text-anchor="middle"
                >
                  1
                </text>
              </svg>
            </button>

            <button class="btn" id="btn-prev" title="Previous">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
              </svg>
            </button>
            <button class="btn btn-main" id="btn-playpause" title="Play/Pause">
              <svg
                id="icon-play"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="currentColor"
                style="display: none; transform: translateX(-5%)"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
              <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            </button>
            <button class="btn" id="btn-next" title="Next">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
              </svg>
            </button>

            <button class="btn" id="btn-like" title="Like">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
            </button>
            <button class="btn" id="btn-lyrics" title="Lyrics">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="m11 7.601-5.994 8.19a1 1 0 0 0 .1 1.298l.817.818a1 1 0 0 0 1.314.087L15.09 12"
                />
                <path
                  d="M16.5 21.174C15.5 20.5 14.372 20 13 20c-2.058 0-3.928 2.356-6 2-2.072-.356-2.775-3.369-1.5-4.5"
                />
                <circle cx="16" cy="7" r="5" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div id="lyrics-section">
        <div id="lyrics-content">
          <div style="opacity: 0.5; text-align: center; margin-top: 20px">
            Open a song to load lyrics
          </div>
        </div>
      </div>
    </div>

    <script src="./mini.js"></script>
  </body>
</html>
