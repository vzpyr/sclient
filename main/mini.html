<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SClient</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

      :root {
        --accent: #f50;
        --card-bg: rgba(20, 20, 24, 0.55);
        --card-border: rgba(255, 255, 255, 0.08);
      }

      .progress-fill,
      .artwork::after,
      .btn.active,
      .eyebrow,
      .eq span {
        transition-property: background, color, border-color, box-shadow,
          -webkit-text-fill-color, background-color;
        transition-duration: 0.35s ease;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
        background: #0a0a0c;
        color: #fff;
        user-select: none;
        -webkit-font-smoothing: antialiased;
        -webkit-app-region: drag;
      }
      *:focus {
        outline: none !important;
      }

      #bg {
        position: absolute;
        top: -12%;
        left: -12%;
        width: 124%;
        height: 124%;
        background-size: cover;
        background-position: center;
        filter: blur(28px) brightness(0.4) saturate(1.6);
        z-index: 0;
        transition: background-image 0.6s ease;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          radial-gradient(120% 90% at 50% 0%, transparent 40%, rgba(0, 0, 0, 0.45) 100%),
          linear-gradient(160deg, rgba(255, 85, 0, 0.06), rgba(10, 10, 14, 0.2) 60%);
      }
      .top-right {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 20;
        -webkit-app-region: no-drag;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .offset-controls {
        display: none;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(10px);
        border-radius: 999px;
        padding: 4px 12px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
        font-variant-numeric: tabular-nums;
      }
      .offset-controls.visible {
        display: flex;
      }
      .offset-val {
        min-width: 30px;
        text-align: right;
      }
      .offset-slider {
        width: 70px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .window-controls {
        display: flex;
        gap: 0;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(10px);
        border-radius: 999px;
        padding: 3px;
      }
      .window-btn {
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.7);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.18s, color 0.18s;
        flex-shrink: 0;
      }
      .window-btn + .window-btn {
        margin-left: 1px;
      }
      .window-btn svg {
        width: 11px;
        height: 11px;
      }
      .window-btn:hover {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
      }
      #btn-close:hover {
        background: rgba(255, 80, 80, 0.32);
      }

      .content {
        position: relative;
        z-index: 5;
        height: 100%;
        display: flex;
        flex-direction: row;
        box-sizing: border-box;
        overflow: hidden;
      }

      #player-section {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        justify-content: flex-start;
        gap: 14px;
        padding: 14px;
        box-sizing: border-box;
        width: 100%;
        overflow: hidden;
      }

      .artwork-container {
        flex-shrink: 0;
        display: flex;
        align-items: center;
      }
      .artwork {
        width: var(--mini-art-size, 152px);
        height: var(--mini-art-size, 152px);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05) center / cover;
        box-shadow:
          0 6px 22px rgba(0, 0, 0, 0.6),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        transition: border-radius 0.3s;
        position: relative;
      }
      .artwork::after {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 16px;
        border: 1px solid var(--accent);
        opacity: 0.25;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .artwork:hover::after {
        opacity: 0.55;
      }

      .right-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        min-width: 0;
        flex: 1;
        overflow: hidden;
      }

      .metadata {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .eyebrow {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
        margin-bottom: 1px;
      }
      .eq {
        display: inline-flex;
        align-items: flex-end;
        gap: 2px;
        height: 10px;
      }
      .eq span {
        display: block;
        width: 2px;
        height: 100%;
        background: var(--accent);
        border-radius: 1px;
        transform-origin: bottom;
        animation: eqbounce 1.1s ease-in-out infinite;
      }
      .eq span:nth-child(1) {
        animation-delay: 0s;
      }
      .eq span:nth-child(2) {
        animation-delay: -0.37s;
      }
      .eq span:nth-child(3) {
        animation-delay: -0.73s;
      }
      .eq.paused span {
        animation-play-state: paused;
        opacity: 0.4;
      }
      @keyframes eqbounce {
        0%,
        100% {
          transform: scaleY(0.3);
        }
        50% {
          transform: scaleY(1);
        }
      }

      .title {
        font-size: 14px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }
      .artist {
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.52);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
      }

      .progress-container {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        box-sizing: border-box;
      }
      .time {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.42);
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
        min-width: 28px;
      }
      .time:first-child {
        text-align: left;
      }
      .time:last-child {
        text-align: right;
      }
      .progress-bar {
        flex: 1;
        height: 3px;
        background: rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        position: relative;
        cursor: pointer;
        -webkit-app-region: no-drag;
        transition: height 0.15s;
      }
      .progress-bar:hover {
        height: 6px;
      }
      .progress-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #fff));
        border-radius: 999px;
        width: 0%;
        pointer-events: none;
        transition: width 0.1s linear;
        box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 70%, transparent);
      }
      .progress-fill::after {
        content: "";
        position: absolute;
        right: -5px;
        top: 50%;
        transform: translateY(-50%) scale(0);
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 80%, transparent);
        transition: transform 0.15s;
      }
      .progress-bar:hover .progress-fill::after {
        transform: translateY(-50%) scale(1);
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        -webkit-app-region: no-drag;
      }

      #lyrics-content {
        -webkit-app-region: no-drag;
      }
      .btn {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.65);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        flex-shrink: 0;
        transition:
          color 0.15s,
          transform 0.15s;
        line-height: 0;
      }
      .btn svg {
        width: 17px;
        height: 17px;
        display: block;
      }
      .btn:hover {
        color: #fff;
        transform: scale(1.14);
      }
      .btn.active {
        color: var(--accent);
      }
      .btn.active:hover {
        color: var(--accent);
      }
      .transport {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--card-border);
        border-radius: 999px;
        padding: 5px 10px;
      }
      .btn-main {
        width: 40px;
        height: 40px;
        background: #fff;
        color: #111;
        border-radius: 50%;
      }
      .btn-main svg {
        width: 20px;
        height: 20px;
      }
      .btn-main:hover {
        transform: scale(1.06);
        background: #efefef;
        color: #111;
      }

      #lyrics-section {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
        box-sizing: border-box;
        padding: 0;
      }
      .with-lyrics #lyrics-section {
        display: flex;
      }

      #lyrics-content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        text-align: center;
        padding: 0 14px;
        box-sizing: border-box;
      }
      #lyrics-content::-webkit-scrollbar {
        width: 0;
        display: none;
      }
      #lyrics-content::-webkit-scrollbar-thumb,
      #lyrics-content::-webkit-scrollbar-track {
        display: none;
      }
      #lyrics-content {
        scrollbar-width: none; 
      }

      .lyric-line {
        transition: color 0.4s ease, transform 0.4s ease, font-size 0.4s ease,
          opacity 0.4s ease, filter 0.4s ease;
        font-size: 14px;
        color: #fff;
        transform-origin: center;
        transform: scale(0.95);
        cursor: pointer;
        padding: 4px 10px;
        box-sizing: border-box;
        border-radius: 8px;
      }
      .lyric-line.active {
        font-size: 16px;
        font-weight: 700;
        transform: scale(1.1);
        opacity: 1;
        filter: blur(0px);
      }
      .lyric-word.sung {
        color: var(--accent) !important;
      }
      .lyric-line.past {
        color: #888;
        font-weight: normal;
        transform: scale(0.95);
        opacity: 0.4;
        filter: blur(2px);
      }
      .lyric-line:hover {
        opacity: 0.9 !important;
        transform: scale(1.05) !important;
        filter: blur(0px) !important;
      }

      @media (max-width: 899px), (max-height: 499px) {
        .with-lyrics #player-section {
          flex-direction: column;
          width: 255px;
          flex-shrink: 0;
          align-items: flex-start;
          justify-content: center;
          gap: 14px;
          padding: 14px;
        }
        .with-lyrics .artwork {
          width: var(--mini-art-size, 152px);
          height: var(--mini-art-size, 152px);
        }
        .with-lyrics .right-panel {
          flex: none;
          width: 100%;
        }
        .with-lyrics #lyrics-section {
          padding: 14px 14px 14px 0;
        }
      }

      @media (min-width: 900px) and (min-height: 500px) {
        .content {
          padding: 5% 8%;
          align-items: center;
          justify-content: flex-start;
          overflow: visible;
        }
        .content.with-lyrics {
          align-items: stretch;
          gap: 6%;
          padding-top: 0;
          padding-bottom: 0;
        }

        #player-section {
          padding: 0;
          gap: 36px;
          align-items: center;
          overflow: visible;
        }
        .with-lyrics #player-section {
          flex-direction: column;
          flex: none;
          width: 40%;
          max-width: 520px;
          min-width: 280px;
          align-items: flex-start;
          justify-content: center;
          gap: 36px;
          padding: 0;
        }

        .artwork {
          flex-shrink: 0;
          width: clamp(200px, 30vh, 340px);
          height: clamp(200px, 30vh, 340px);
          border-radius: 18px;
          box-shadow:
            0 20px 60px rgba(0, 0, 0, 0.7),
            inset 0 0 0 1px rgba(255, 255, 255, 0.1);
          overflow: visible;
        }
        .artwork::after {
          inset: -4px;
          border-radius: 22px;
        }

        .right-panel {
          flex: 1;
          min-width: 0;
          max-width: 720px;
          gap: 36px;
          justify-content: center;
        }
        .with-lyrics .right-panel {
          flex: none;
          width: 100%;
          max-width: 100%;
        }

        .metadata {
          gap: 10px;
        }
        .eyebrow {
          font-size: 11px;
        }
        .eq {
          height: 13px;
        }
        .title {
          font-size: clamp(22px, 2.6vw, 36px);
          font-weight: 800;
          white-space: normal;
          line-height: 1.2;
          letter-spacing: -0.02em;
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
        }
        .artist {
          font-size: clamp(14px, 1.6vw, 20px);
          font-weight: 500;
          color: rgba(255, 255, 255, 0.6);
        }

        .progress-container {
          gap: 14px;
        }
        .time {
          font-size: 13px;
          min-width: 42px;
          color: rgba(255, 255, 255, 0.5);
        }
        .progress-bar {
          height: 5px;
          border-radius: 999px;
        }
        .progress-bar:hover {
          height: 8px;
        }

        .controls {
          justify-content: flex-start;
          gap: 32px;
        }

        .btn svg {
          width: 34px;
          height: 34px;
        }
        .btn-main {
          width: 74px;
          height: 74px;
        }
        .btn-main svg {
          width: 36px;
          height: 36px;
        }
        .transport {
          gap: 22px;
          padding: 8px 16px;
        }
        #icon-loop-one text {
          font-size: 16px;
        }

        #lyrics-section {
          display: flex;
          flex: 1;
          align-self: stretch;
          padding: 0;
        }
        #lyrics-content {
          padding: 0 40px;
        }
        .lyric-line {
          font-size: clamp(16px, 1.7vw, 22px);
          padding: 9px 14px;
          border-radius: 10px;
        }
        .lyric-line.active {
          font-size: clamp(20px, 2.3vw, 30px);
          transform: scale(1.08);
        }
        .lyric-line.past {
          transform: scale(0.93);
        }
      }
    </style>
  </head>
  <body>
    <div id="bg"></div>

    <div class="top-right">
      <div class="offset-controls" id="offset-controls">
        <input type="range" id="offset-slider" class="offset-slider" min="-2" max="2" step="0.1" value="0" title="Lyrics timing offset">
        <span id="offset-val" class="offset-val">0.0s</span>
      </div>
      <div class="window-controls">
      <button class="window-btn" id="btn-minimize" title="Minimize">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M5 12h14" />
        </svg>
      </button>
      <button class="window-btn" id="btn-fullscreen" title="Fullscreen">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
          />
        </svg>
      </button>
      <button class="window-btn" id="btn-close" title="Back to main window">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
      </div>
    </div>

    <div class="content">
      <div id="player-section">
        <div class="artwork-container">
          <div class="artwork" id="artwork"></div>
        </div>

        <div class="right-panel">
          <div class="metadata">
            <div class="eyebrow">
              <span class="eq" id="eq-indicator">
                <span></span><span></span><span></span>
              </span>
              Now Playing
            </div>
            <div class="title" id="title">Not Playing</div>
            <div class="artist" id="artist">-</div>
          </div>

          <div class="progress-container">
            <div class="time" id="time-current">0:00</div>
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time" id="time-duration">0:00</div>
          </div>

          <div class="controls">
            <button class="btn" id="btn-shuffle" title="Shuffle">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22M18 22l4-4-4-4M2 6h1.9c1.5 0 2.8.8 3.6 2l3.5 5M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-1-1.5M18 2l4 4-4 4"
                />
              </svg>
            </button>
            <button class="btn" id="btn-loop" title="Repeat">
              <svg
                id="icon-loop-all"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="display: block"
              >
                <polyline points="17 1 21 5 17 9" />
                <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                <polyline points="7 23 3 19 7 15" />
                <path d="M21 13v2a4 4 0 0 1-4 4H3" />
              </svg>
              <svg
                id="icon-loop-one"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="display: none"
              >
                <polyline points="17 1 21 5 17 9" />
                <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                <polyline points="7 23 3 19 7 15" />
                <path d="M21 13v2a4 4 0 0 1-4 4H3" />
                <text
                  x="12"
                  y="16"
                  fill="currentColor"
                  stroke="none"
                  font-size="10"
                  font-family="sans-serif"
                  text-anchor="middle"
                >
                  1
                </text>
              </svg>
            </button>

            <div class="transport">
              <button class="btn" id="btn-prev" title="Previous">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                </svg>
              </button>
              <button class="btn btn-main" id="btn-playpause" title="Play/Pause">
                <svg
                  id="icon-play"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  style="display: none; transform: translateX(-5%)"
                >
                  <path d="M8 5v14l11-7z" />
                </svg>
                <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
              </button>
              <button class="btn" id="btn-next" title="Next">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                </svg>
              </button>
            </div>

            <button class="btn" id="btn-like" title="Like">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
            </button>
            <button class="btn" id="btn-lyrics" title="Lyrics">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="m11 7.601-5.994 8.19a1 1 0 0 0 .1 1.298l.817.818a1 1 0 0 0 1.314.087L15.09 12"
                />
                <path
                  d="M16.5 21.174C15.5 20.5 14.372 20 13 20c-2.058 0-3.928 2.356-6 2-2.072-.356-2.775-3.369-1.5-4.5"
                />
                <circle cx="16" cy="7" r="5" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div id="lyrics-section">
        <div id="lyrics-content">
          <div style="opacity: 0.5; text-align: center; margin-top: 20px">
            Open a song to load lyrics
          </div>
        </div>
      </div>
    </div>

    <script src="./mini.js"></script>
  </body>
</html>
