<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SClient Mini Player</title>
  <style>
    :root { --accent: #f50; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden; background: #111; color: #fff;
      user-select: none;
    }
    
    *:focus { outline: none !important; }

    #bg {
      position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
      background-size: cover; background-position: center;
      filter: blur(20px) brightness(0.4); z-index: 0;
      transition: background-image 0.5s ease;
    }

    /* Drag region for frameless window */
    .drag-region {
      position: absolute; top: 0; left: 0; width: 100%; height: 40px;
      -webkit-app-region: drag; z-index: 10;
    }

    .window-controls {
      position: absolute; top: 10px; right: 10px; z-index: 20;
      -webkit-app-region: no-drag; display: flex; gap: 8px;
    }
    
    .window-btn {
      background: rgba(255, 255, 255, 0.1); border: none; color: #fff;
      border-radius: 50%; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .window-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .content {
      position: relative; z-index: 5; height: 100%; display: flex;
      flex-direction: row; box-sizing: border-box;
    }

    #player-section {
      display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 24px;
      padding: 24px; box-sizing: border-box; width: 100%; transition: all 0.3s;
    }
    
    .with-lyrics #player-section {
      flex-direction: column; width: 320px; padding: 24px; justify-content: center; align-items: flex-start; gap: 16px;
    }

    .artwork-container {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    
    .artwork {
      width: 130px; height: 130px; border-radius: 12px;
      background-size: cover; background-position: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }
    .with-lyrics .artwork {
      width: 180px; height: 180px;
    }

    .right-panel {
      display: flex; flex-direction: column; justify-content: center;
      min-width: 250px; width: 100%; max-width: 400px;
    }
    .with-lyrics .right-panel {
      flex: none;
    }

    .metadata {
      text-align: left; margin-bottom: 12px; transition: all 0.3s;
    }
    .with-lyrics .metadata {
      text-align: left; margin-bottom: 12px;
    }
    
    .title {
      font-size: 16px; font-weight: 700; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
    }
    
    .artist {
      font-size: 13px; font-weight: 500; color: #aaa; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .progress-container {
      margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
    }
    
    .time { font-size: 11px; color: #aaa; min-width: 35px; text-align: left; font-variant-numeric: tabular-nums; }
    .time:last-child { text-align: right; }
    
    .progress-bar {
      flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
      position: relative; cursor: pointer; -webkit-app-region: no-drag;
    }
    
    .progress-fill {
      position: absolute; top: 0; left: 0; height: 100%;
      background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none;
    }

    .controls {
      display: flex; align-items: center; justify-content: space-between;
      -webkit-app-region: no-drag; width: 100%;
    }

    .btn {
      background: none; border: none; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; padding: 0; opacity: 0.8;
    }
    .btn:hover { opacity: 1; transform: scale(1.1); }
    .btn.active { color: var(--accent); opacity: 1; }
    
    .btn-main {
      width: 48px; height: 48px; background: #fff; color: #111;
      border-radius: 50%; opacity: 1;
    }
    .btn-main:hover { transform: scale(1.05); background: #eee; }

    #lyrics-section {
      display: none; flex: 1; max-width: 700px; padding: 24px 24px 24px 0; box-sizing: border-box;
      flex-direction: column; overflow: hidden;
    }
    .with-lyrics #lyrics-section {
      display: flex;
    }
    
    #lyrics-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: #e0e0e0;
      text-align: center; padding: 0 24px;
    }
    #lyrics-content::-webkit-scrollbar { width: 6px; }
    #lyrics-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

    .lyric-line {
      transition: all 0.4s ease; font-size: 16px; color: #fff; transform-origin: center;
      transform: scale(0.95); cursor: pointer; padding: 4px 10px; box-sizing: border-box;
    }
    .lyric-line.active {
      font-size: 18px; color: var(--accent); font-weight: bold; transform: scale(1.1); opacity: 1; filter: blur(0px);
    }
    .lyric-line.past {
      color: #888; font-weight: normal; transform: scale(0.95); opacity: 0.4; filter: blur(1px);
    }
    .lyric-line:hover {
      opacity: 0.9 !important; transform: scale(1.05) !important; filter: blur(0px) !important;
    }

    /* FULLSCREEN / LARGE MODE SCALING */
    @media (min-width: 750px) and (min-height: 500px) {
      .content { padding: 40px 10%; align-items: stretch; justify-content: center; gap: 0; }
      .content.with-lyrics { justify-content: space-between; gap: 64px; }
      
      #player-section { 
        flex-direction: column; width: 100%; max-width: 1000px; padding: 0; 
        align-items: center; justify-content: center; gap: 48px; 
      }
      .with-lyrics #player-section { 
        flex: 1; max-width: 45%; align-items: flex-start; justify-content: center; gap: 48px; 
      }
      
      .artwork { width: 400px; height: 400px; max-width: 50vh; max-height: 50vh; }
      .with-lyrics .artwork { width: 50vh; height: 50vh; max-width: 600px; max-height: 600px; }
      
      .right-panel { width: 100%; max-width: 800px; align-items: center; }
      .with-lyrics .right-panel { max-width: none; align-items: flex-start; }

      .metadata { text-align: center; }
      .with-lyrics .metadata { text-align: left; }

      .title { font-size: 48px; font-weight: 800; margin-bottom: 12px; line-height: 1.2; white-space: normal; }
      .artist { font-size: 28px; font-weight: 600; opacity: 0.8; }
      
      .progress-container { width: 100%; margin-bottom: 24px; box-sizing: border-box; }
      .time { font-size: 20px; min-width: 60px; }
      .progress-bar { height: 10px; border-radius: 5px; }
      .progress-fill { border-radius: 5px; }
      
      .controls { padding: 0; justify-content: center; gap: 32px; width: 100%; }
      .with-lyrics .controls { justify-content: flex-start; }
      
      .btn { flex-shrink: 0; }
      .btn svg { width: 40px !important; height: 40px !important; flex-shrink: 0; }
      .btn-main { width: 90px; height: 90px; flex-shrink: 0; }
      .btn-main svg { width: 48px !important; height: 48px !important; flex-shrink: 0; }
      #icon-loop-one text { font-size: 20px; }

      #lyrics-section { flex: 1; max-width: 55%; padding: 0; height: 100%; box-sizing: border-box; }
      #lyrics-content { font-size: 28px; text-align: center; padding: 0 40px; }
      .lyric-line { font-size: 32px; padding: 16px 0; }
      .lyric-line.active { font-size: 48px; transform: scale(1.02); }
    }
    
  </style>
</head>
<body>
  <div id="bg"></div>
  <div class="drag-region"></div>
  
  <div class="window-controls">
    <button class="window-btn" id="btn-minimize" title="Minimize">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
    </button>
    <button class="window-btn" id="btn-fullscreen" title="Fullscreen">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>
    <button class="window-btn" id="btn-close" title="Back to main window">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="content">
    <div id="player-section">
      <div class="artwork-container">
        <div class="artwork" id="artwork"></div>
      </div>
      
      <div class="right-panel">
        <div class="metadata">
          <div class="title" id="title">Not Playing</div>
          <div class="artist" id="artist">-</div>
        </div>
        
        <div class="progress-container">
          <div class="time" id="time-current">0:00</div>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="time" id="time-duration">0:00</div>
        </div>
        
        <div class="controls">
        <button class="btn" id="btn-shuffle" title="Shuffle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22M18 22l4-4-4-4M2 6h1.9c1.5 0 2.8.8 3.6 2l3.5 5M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-1-1.5M18 2l4 4-4 4"/></svg>
        </button>
        <button class="btn" id="btn-lyrics" title="Lyrics">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m11 7.601-5.994 8.19a1 1 0 0 0 .1 1.298l.817.818a1 1 0 0 0 1.314.087L15.09 12"/><path d="M16.5 21.174C15.5 20.5 14.372 20 13 20c-2.058 0-3.928 2.356-6 2-2.072-.356-2.775-3.369-1.5-4.5"/><circle cx="16" cy="7" r="5"/></svg>
        </button>
        <button class="btn" id="btn-prev" title="Previous">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="btn btn-main" id="btn-playpause" title="Play/Pause">
          <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none; margin-left:4px;"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="btn" id="btn-next" title="Next">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="btn" id="btn-loop" title="Repeat">
          <svg id="icon-loop-all" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:block;"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <svg id="icon-loop-one" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="12" y="16" fill="currentColor" stroke="none" font-size="10" font-family="sans-serif" text-anchor="middle">1</text></svg>
        </button>
        <button class="btn" id="btn-like" title="Like">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        </div>
      </div>
    </div>
    
    <div id="lyrics-section">
      <div id="lyrics-content">
        <div style="opacity:0.5; text-align:center; margin-top:20px;">Open a song to load lyrics</div>
      </div>
    </div>
  </div>

  <script src="./mini.js"></script>
</body>
</html>
